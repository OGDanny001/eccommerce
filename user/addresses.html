<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Addresses - LuxuryStore</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .account-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 2rem;
      }
      .account-sidebar {
        background: var(--bg-primary);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        box-shadow: var(--shadow-sm);
        height: fit-content;
      }
      .account-menu {
        list-style: none;
      }
      .account-menu li {
        margin-bottom: 0.5rem;
      }
      .account-menu a {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-md);
        text-decoration: none;
        color: var(--text-primary);
        transition: all 0.2s;
      }
      .account-menu a:hover,
      .account-menu a.active {
        background: var(--primary-color);
        color: white;
      }
      .account-content {
        background: var(--bg-primary);
        border-radius: var(--radius-lg);
        padding: 2rem;
        box-shadow: var(--shadow-sm);
      }
      .address-card {
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        position: relative;
      }
      .address-card.primary {
        border-color: var(--primary-color);
      }
      .address-actions {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
      }
      .address-actions button {
        background: none;
        border: none;
        color: var(--primary-color);
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 500;
      }
      .address-actions button:hover {
        text-decoration: underline;
      }
      @media (max-width: 768px) {
        .account-layout {
          grid-template-columns: 1fr;
        }
        .account-sidebar {
          position: sticky;
          top: 80px;
        }
      }
    </style>
  </head>
  <body>
    <div id="navbar-container"></div>

    <section>
      <div class="container">
        <h2 style="margin-bottom: 2rem">My Account</h2>
        <div class="account-layout">
          <aside class="account-sidebar">
            <h3 style="margin-bottom: 1rem">Account Menu</h3>
            <ul class="account-menu">
              <li>
                <a href="dashboard.html"
                  ><i class="fas fa-chart-bar"></i> Dashboard</a
                >
              </li>
              <li>
                <a href="orders.html"><i class="fas fa-box"></i> My Orders</a>
              </li>
              <li>
                <a href="profile.html"
                  ><i class="fas fa-user"></i> Profile Settings</a
                >
              </li>
              <li>
                <a href="addresses.html" class="active"
                  ><i class="fas fa-home"></i> Saved Addresses</a
                >
              </li>
              <li>
                <a href="../wishlist.html"
                  ><i class="fas fa-heart"></i> Wishlist</a
                >
              </li>
            </ul>
          </aside>

          <main class="account-content">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2rem;
              "
            >
              <h3>Saved Addresses</h3>
              <button
                class="btn btn-primary"
                onclick="
                  showNotification('Add new address modal would open here!')
                "
              >
                <i class="fas fa-plus"></i> Add New Address
              </button>
            </div>

            <div class="address-card primary">
              <span
                style="
                  position: absolute;
                  top: 1rem;
                  right: 1rem;
                  background: var(--primary-color);
                  color: white;
                  font-size: 0.75rem;
                  padding: 0.25rem 0.75rem;
                  border-radius: var(--radius-sm);
                "
                >Primary</span
              >
              <h4 style="margin-bottom: 0.5rem">John Doe</h4>
              <p style="color: var(--text-secondary); margin-bottom: 0.25rem">
                123 Main St
              </p>
              <p style="color: var(--text-secondary); margin-bottom: 0.25rem">
                New York, NY 10001
              </p>
              <p style="color: var(--text-secondary); margin-bottom: 0.25rem">
                United States
              </p>
              <p style="color: var(--text-secondary)">+1 (555) 123-4567</p>
              <div class="address-actions">
                <button>Edit</button>
                <button>Delete</button>
              </div>
            </div>

            <div class="address-card">
              <h4 style="margin-bottom: 0.5rem">John Doe</h4>
              <p style="color: var(--text-secondary); margin-bottom: 0.25rem">
                456 Oak Ave
              </p>
              <p style="color: var(--text-secondary); margin-bottom: 0.25rem">
                Brooklyn, NY 11201
              </p>
              <p style="color: var(--text-secondary); margin-bottom: 0.25rem">
                United States
              </p>
              <p style="color: var(--text-secondary)">+1 (555) 987-6543</p>
              <div class="address-actions">
                <button>Set as Primary</button>
                <button>Edit</button>
                <button>Delete</button>
              </div>
            </div>
          </main>
        </div>
      </div>
    </section>

    <div id="footer-container"></div>

    <script src="../components/navbar.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
