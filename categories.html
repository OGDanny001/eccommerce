<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories - LuxuryStore</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div id="navbar-container"></div>

    <!-- Categories Content -->
    <section>
      <div class="container">
        <div class="section-header">
          <h2>Shop by Category</h2>
          <p>Browse our extensive collection of products</p>
        </div>
        <div class="categories-grid" style="margin-bottom: 3rem">
          <div class="category-card">
            <i
              class="fas fa-tshirt"
              style="
                font-size: 3rem;
                color: var(--primary-color);
                margin-bottom: 1rem;
              "
            ></i>
            <h4>Clothing</h4>
            <p>128 Products</p>
          </div>
          <div class="category-card">
            <i
              class="fas fa-mobile-alt"
              style="
                font-size: 3rem;
                color: var(--primary-color);
                margin-bottom: 1rem;
              "
            ></i>
            <h4>Electronics</h4>
            <p>96 Products</p>
          </div>
          <div class="category-card">
            <i
              class="fas fa-gem"
              style="
                font-size: 3rem;
                color: var(--primary-color);
                margin-bottom: 1rem;
              "
            ></i>
            <h4>Jewelry</h4>
            <p>64 Products</p>
          </div>
          <div class="category-card">
            <i
              class="fas fa-home"
              style="
                font-size: 3rem;
                color: var(--primary-color);
                margin-bottom: 1rem;
              "
            ></i>
            <h4>Home & Garden</h4>
            <p>156 Products</p>
          </div>
          <div class="category-card">
            <i
              class="fas fa-gamepad"
              style="
                font-size: 3rem;
                color: var(--primary-color);
                margin-bottom: 1rem;
              "
            ></i>
            <h4>Gaming</h4>
            <p>72 Products</p>
          </div>
          <div class="category-card">
            <i
              class="fas fa-running"
              style="
                font-size: 3rem;
                color: var(--primary-color);
                margin-bottom: 1rem;
              "
            ></i>
            <h4>Sports</h4>
            <p>88 Products</p>
          </div>
        </div>
      </div>
    </section>

    <div id="footer-container"></div>

    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
