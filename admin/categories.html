<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Categories - LuxuryStore</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .admin-layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: 100vh;
      }
      .admin-sidebar {
        background: #111827;
        color: white;
        padding: 2rem 1.5rem;
      }
      .admin-sidebar h2 {
        margin-bottom: 2rem;
        color: white;
      }
      .admin-menu {
        list-style: none;
      }
      .admin-menu li {
        margin-bottom: 0.5rem;
      }
      .admin-menu a {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-md);
        text-decoration: none;
        color: #d1d5db;
        transition: all 0.2s;
      }
      .admin-menu a:hover,
      .admin-menu a.active {
        background: #1f2937;
        color: white;
      }
      .admin-content {
        padding: 2rem;
        background: var(--bg-secondary);
      }
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .admin-card {
        background: var(--bg-primary);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        box-shadow: var(--shadow-sm);
      }
      .category-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 0;
        border-bottom: 1px solid var(--border-color);
      }
      .category-row:last-child {
        border-bottom: none;
      }
      @media (max-width: 1024px) {
        .admin-layout {
          grid-template-columns: 1fr;
        }
        .admin-sidebar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <h2>LuxuryStore Admin</h2>
        <ul class="admin-menu">
          <li>
            <a href="dashboard.html"
              ><i class="fas fa-chart-bar"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="products.html"
              ><i class="fas fa-box"></i> Products</a
            >
          </li>
          <li>
            <a href="categories.html" class="active"
              ><i class="fas fa-folder"></i> Categories</a
            >
          </li>
          <li>
            <a href="orders.html"
              ><i class="fas fa-shopping-cart"></i> Orders</a
            >
          </li>
          <li>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
          </li>
          <li>
            <a href="analytics.html"
              ><i class="fas fa-chart-line"></i> Analytics</a
            >
          </li>
          <li>
            <a href="../index.html"
              ><i class="fas fa-arrow-left"></i> Back to Store</a
            >
          </li>
        </ul>
      </aside>

      <main class="admin-content">
        <div class="admin-header">
          <h1>Manage Categories</h1>
          <button
            class="btn btn-primary"
            onclick="showNotification('Add category modal would open here!')"
          >
            <i class="fas fa-plus"></i> Add New Category
          </button>
        </div>

        <div class="admin-card">
          <div class="category-row">
            <div style="flex: 1">
              <h4>Electronics</h4>
              <p style="color: var(--text-secondary); font-size: 0.875rem">
                96 Products
              </p>
            </div>
            <div style="display: flex; gap: 0.5rem">
              <button class="btn btn-secondary btn-sm">Edit</button>
              <button
                class="btn btn-sm"
                style="background: #fee2e2; color: #991b1b; border: none"
              >
                Delete
              </button>
            </div>
          </div>
          <div class="category-row">
            <div style="flex: 1">
              <h4>Clothing</h4>
              <p style="color: var(--text-secondary); font-size: 0.875rem">
                128 Products
              </p>
            </div>
            <div style="display: flex; gap: 0.5rem">
              <button class="btn btn-secondary btn-sm">Edit</button>
              <button
                class="btn btn-sm"
                style="background: #fee2e2; color: #991b1b; border: none"
              >
                Delete
              </button>
            </div>
          </div>
          <div class="category-row">
            <div style="flex: 1">
              <h4>Jewelry</h4>
              <p style="color: var(--text-secondary); font-size: 0.875rem">
                64 Products
              </p>
            </div>
            <div style="display: flex; gap: 0.5rem">
              <button class="btn btn-secondary btn-sm">Edit</button>
              <button
                class="btn btn-sm"
                style="background: #fee2e2; color: #991b1b; border: none"
              >
                Delete
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../assets/js/app.js"></script>
  </body>
</html>
