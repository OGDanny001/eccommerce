<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Orders - LuxuryStore</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .admin-layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: 100vh;
      }
      .admin-sidebar {
        background: #111827;
        color: white;
        padding: 2rem 1.5rem;
      }
      .admin-sidebar h2 {
        margin-bottom: 2rem;
        color: white;
      }
      .admin-menu {
        list-style: none;
      }
      .admin-menu li {
        margin-bottom: 0.5rem;
      }
      .admin-menu a {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-md);
        text-decoration: none;
        color: #d1d5db;
        transition: all 0.2s;
      }
      .admin-menu a:hover,
      .admin-menu a.active {
        background: #1f2937;
        color: white;
      }
      .admin-content {
        padding: 2rem;
        background: var(--bg-secondary);
      }
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .admin-card {
        background: var(--bg-primary);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        box-shadow: var(--shadow-sm);
      }
      @media (max-width: 1024px) {
        .admin-layout {
          grid-template-columns: 1fr;
        }
        .admin-sidebar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <h2>LuxuryStore Admin</h2>
        <ul class="admin-menu">
          <li>
            <a href="dashboard.html"
              ><i class="fas fa-chart-bar"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="products.html"
              ><i class="fas fa-box"></i> Products</a
            >
          </li>
          <li>
            <a href="categories.html"
              ><i class="fas fa-folder"></i> Categories</a
            >
          </li>
          <li>
            <a href="orders.html" class="active"
              ><i class="fas fa-shopping-cart"></i> Orders</a
            >
          </li>
          <li>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
          </li>
          <li>
            <a href="analytics.html"
              ><i class="fas fa-chart-line"></i> Analytics</a
            >
          </li>
          <li>
            <a href="../index.html"
              ><i class="fas fa-arrow-left"></i> Back to Store</a
            >
          </li>
        </ul>
      </aside>

      <main class="admin-content">
        <div class="admin-header">
          <h1>Manage Orders</h1>
        </div>

        <div class="admin-card">
          <div style="overflow-x: auto">
            <table style="width: 100%; border-collapse: collapse">
              <thead>
                <tr style="border-bottom: 1px solid var(--border-color)">
                  <th
                    style="
                      text-align: left;
                      padding: 1rem;
                      color: var(--text-secondary);
                    "
                  >
                    Order ID
                  </th>
                  <th
                    style="
                      text-align: left;
                      padding: 1rem;
                      color: var(--text-secondary);
                    "
                  >
                    Customer
                  </th>
                  <th
                    style="
                      text-align: left;
                      padding: 1rem;
                      color: var(--text-secondary);
                    "
                  >
                    Total
                  </th>
                  <th
                    style="
                      text-align: left;
                      padding: 1rem;
                      color: var(--text-secondary);
                    "
                  >
                    Status
                  </th>
                  <th
                    style="
                      text-align: left;
                      padding: 1rem;
                      color: var(--text-secondary);
                    "
                  >
                    Date
                  </th>
                  <th
                    style="
                      text-align: left;
                      padding: 1rem;
                      color: var(--text-secondary);
                    "
                  >
                    Actions
                  </th>
                </tr>
              </thead>
              <tbody>
                <tr style="border-bottom: 1px solid var(--border-color)">
                  <td style="padding: 1rem">#12345</td>
                  <td style="padding: 1rem">John Doe</td>
                  <td style="padding: 1rem">$299.00</td>
                  <td style="padding: 1rem">
                    <span
                      style="
                        background: #d1fae5;
                        color: #065f46;
                        padding: 0.25rem 0.75rem;
                        border-radius: var(--radius-sm);
                        font-size: 0.875rem;
                      "
                      >Delivered</span
                    >
                  </td>
                  <td style="padding: 1rem">Jun 5, 2024</td>
                  <td style="padding: 1rem">
                    <select
                      style="
                        padding: 0.5rem;
                        border: 1px solid var(--border-color);
                        border-radius: var(--radius-md);
                      "
                      onchange="showNotification('Order status updated!')"
                    >
                      <option>Update Status</option>
                      <option>Processing</option>
                      <option>Shipped</option>
                      <option selected>Delivered</option>
                    </select>
                  </td>
                </tr>
                <tr style="border-bottom: 1px solid var(--border-color)">
                  <td style="padding: 1rem">#12344</td>
                  <td style="padding: 1rem">Jane Smith</td>
                  <td style="padding: 1rem">$199.00</td>
                  <td style="padding: 1rem">
                    <span
                      style="
                        background: #dbeafe;
                        color: #1e40af;
                        padding: 0.25rem 0.75rem;
                        border-radius: var(--radius-sm);
                        font-size: 0.875rem;
                      "
                      >Shipped</span
                    >
                  </td>
                  <td style="padding: 1rem">May 28, 2024</td>
                  <td style="padding: 1rem">
                    <select
                      style="
                        padding: 0.5rem;
                        border: 1px solid var(--border-color);
                        border-radius: var(--radius-md);
                      "
                      onchange="showNotification('Order status updated!')"
                    >
                      <option>Update Status</option>
                      <option>Processing</option>
                      <option selected>Shipped</option>
                      <option>Delivered</option>
                    </select>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="../assets/js/app.js"></script>
  </body>
</html>
