<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product - LuxuryStore</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .admin-layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: 100vh;
      }
      .admin-sidebar {
        background: #111827;
        color: white;
        padding: 2rem 1.5rem;
      }
      .admin-sidebar h2 {
        margin-bottom: 2rem;
        color: white;
      }
      .admin-menu {
        list-style: none;
      }
      .admin-menu li {
        margin-bottom: 0.5rem;
      }
      .admin-menu a {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-md);
        text-decoration: none;
        color: #d1d5db;
        transition: all 0.2s;
      }
      .admin-menu a:hover,
      .admin-menu a.active {
        background: #1f2937;
        color: white;
      }
      .admin-content {
        padding: 2rem;
        background: var(--bg-secondary);
      }
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .admin-card {
        background: var(--bg-primary);
        border-radius: var(--radius-lg);
        padding: 2rem;
        box-shadow: var(--shadow-sm);
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        font-size: 1rem;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 1024px) {
        .admin-layout {
          grid-template-columns: 1fr;
        }
        .admin-sidebar {
          display: none;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <h2>LuxuryStore Admin</h2>
        <ul class="admin-menu">
          <li>
            <a href="dashboard.html"
              ><i class="fas fa-chart-bar"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="products.html" class="active"
              ><i class="fas fa-box"></i> Products</a
            >
          </li>
          <li>
            <a href="categories.html"
              ><i class="fas fa-folder"></i> Categories</a
            >
          </li>
          <li>
            <a href="orders.html"
              ><i class="fas fa-shopping-cart"></i> Orders</a
            >
          </li>
          <li>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
          </li>
          <li>
            <a href="analytics.html"
              ><i class="fas fa-chart-line"></i> Analytics</a
            >
          </li>
          <li>
            <a href="../index.html"
              ><i class="fas fa-arrow-left"></i> Back to Store</a
            >
          </li>
        </ul>
      </aside>

      <main class="admin-content">
        <div class="admin-header">
          <h1>Add New Product</h1>
          <a href="products.html" class="btn btn-secondary"
            ><i class="fas fa-arrow-left"></i> Back to Products</a
          >
        </div>

        <div class="admin-card">
          <form
            onsubmit="
              event.preventDefault();
              showNotification('Product added successfully!');
            "
          >
            <div class="form-group">
              <label>Product Name</label>
              <input type="text" placeholder="Enter product name" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Price</label>
                <input type="number" placeholder="0.00" step="0.01" required />
              </div>
              <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" placeholder="0" required />
              </div>
            </div>
            <div class="form-group">
              <label>Category</label>
              <select required>
                <option value="">Select category</option>
                <option>Electronics</option>
                <option>Clothing</option>
                <option>Jewelry</option>
              </select>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea
                rows="5"
                placeholder="Enter product description"
                required
              ></textarea>
            </div>
            <div style="display: flex; gap: 1rem">
              <button type="submit" class="btn btn-primary">
                Save Product
              </button>
              <a href="products.html" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="../assets/js/app.js"></script>
  </body>
</html>
