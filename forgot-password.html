<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - LuxuryStore</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .auth-container {
        max-width: 450px;
        margin: 3rem auto;
        background: var(--bg-primary);
        padding: 2.5rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
      }
      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .auth-link {
        text-align: center;
        margin-top: 1.5rem;
      }
      .auth-link a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="navbar-container"></div>

    <!-- Forgot Password Content -->
    <section>
      <div class="container">
        <div class="auth-container">
          <div class="auth-header">
            <h2>Forgot Password?</h2>
            <p style="color: var(--text-secondary)">
              Enter your email to reset your password
            </p>
          </div>
          <form id="forgot-password-form">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="your@email.com" required />
            </div>
            <button
              type="button"
              onclick="
                if (validateForm('forgot-password-form'))
                  showNotification('Password reset email sent!');
              "
              class="btn btn-primary btn-lg"
              style="width: 100%"
            >
              Send Reset Link
            </button>
          </form>
          <div class="auth-link">
            <p style="color: var(--text-secondary)">
              Remember your password? <a href="login.html">Login</a>
            </p>
          </div>
        </div>
      </div>
    </section>

    <div id="footer-container"></div>

    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
