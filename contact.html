<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - LuxuryStore</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .contact-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }
      .contact-form,
      .contact-info {
        background: var(--bg-primary);
        border-radius: var(--radius-lg);
        padding: 2rem;
        box-shadow: var(--shadow-sm);
      }
      .info-item {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .info-icon {
        width: 50px;
        height: 50px;
        background: var(--primary-color);
        color: white;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }
      @media (max-width: 768px) {
        .contact-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="navbar-container"></div>

    <!-- Contact Content -->
    <section>
      <div class="container">
        <div class="section-header">
          <h2>Get in Touch</h2>
          <p>We'd love to hear from you!</p>
        </div>
        <div class="contact-layout">
          <div class="contact-form">
            <h3 style="margin-bottom: 1.5rem">Send us a Message</h3>
            <form id="contact-form">
              <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Your name" required />
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Your email" required />
              </div>
              <div class="form-group">
                <label>Subject</label>
                <input type="text" placeholder="Subject" required />
              </div>
              <div class="form-group">
                <label>Message</label>
                <textarea
                  rows="5"
                  placeholder="Your message"
                  required
                ></textarea>
              </div>
              <button
                type="button"
                onclick="
                  if (validateForm('contact-form'))
                    showNotification('Message sent successfully!');
                "
                class="btn btn-primary btn-lg"
                style="width: 100%"
              >
                Send Message
              </button>
            </form>
          </div>

          <div class="contact-info">
            <h3 style="margin-bottom: 1.5rem">Contact Information</h3>
            <div class="info-item">
              <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
              <div>
                <h4>Address</h4>
                <p style="color: var(--text-secondary)">
                  123 Luxury Street, New York, NY 10001
                </p>
              </div>
            </div>
            <div class="info-item">
              <div class="info-icon"><i class="fas fa-phone"></i></div>
              <div>
                <h4>Phone</h4>
                <p style="color: var(--text-secondary)">+1 (555) 123-4567</p>
              </div>
            </div>
            <div class="info-item">
              <div class="info-icon"><i class="fas fa-envelope"></i></div>
              <div>
                <h4>Email</h4>
                <p style="color: var(--text-secondary)">
                  support@luxurystore.com
                </p>
              </div>
            </div>
            <div class="info-item">
              <div class="info-icon"><i class="fas fa-clock"></i></div>
              <div>
                <h4>Business Hours</h4>
                <p style="color: var(--text-secondary)">
                  Mon - Fri: 9AM - 6PM<br />Sat - Sun: 10AM - 4PM
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div id="footer-container"></div>

    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
